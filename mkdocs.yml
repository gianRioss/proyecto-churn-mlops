site_name: Proyecto MLOps Local - Predicción de Churn
site_description: Documentación técnica del proyecto MLOps local para predicción de abandono de clientes.
site_author: Gianmarco Rios

theme:
  name: material
  language: es
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Inicio: index.md
  - Etapa 1 - Entrenamiento: etapa1_entrenamiento.md
  - Etapa 2 - Despliegue: etapa2_despliegue.md
  - Arquitectura: arquitectura.md
  - Evidencias: evidencias.md
  - Próxima etapa - Monitoreo: etapa3_monitoreo.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true